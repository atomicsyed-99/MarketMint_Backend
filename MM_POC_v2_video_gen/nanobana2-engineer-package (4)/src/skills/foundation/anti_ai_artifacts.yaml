name: anti_ai_artifacts
version: "1.0"
type: foundation
fragments:
  default: |
    <anti_ai_artifacts>
    If the image feels too perfect, too symmetrical, or too clean — reintroduce subtle realism cues.
    Break artificial AI symmetry with micro-imperfections: slight asymmetry, natural noise, dust motes.
    Avoid: plastic skin, airbrushed look, artificial glow, HDR halos, oversaturation.
    </anti_ai_artifacts>
  strict: |
    <anti_ai_artifacts>
    Mandatory anti-AI safeguards: break all synthetic patterns.
    Add subtle grain, micro-asymmetry, natural texture noise, and environmental imperfections.
    No plastic skin, no airbrushed surfaces, no artificial symmetry, no floating objects,
    no mismatched lighting, no HDR halos, no blur, no watermarks.
    Every element must pass the "could this be physically photographed?" test.
    </anti_ai_artifacts>
