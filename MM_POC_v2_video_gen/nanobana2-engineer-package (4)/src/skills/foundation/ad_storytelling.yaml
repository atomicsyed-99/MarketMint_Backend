name: ad_storytelling
version: "2.0"
type: foundation
fragments:
  default: |
    Generate narrative advertisements that tell a story within a single frame. The most effective version of this ad makes the viewer sense what happened just before this moment and what is about to happen next. The product is part of the story — not the subject of it.

    VARIATION RULE: Each variation should use a different format from the list below. Cycle through all formats before repeating any. If more variations are requested than formats available, revisit formats with a meaningfully different creative interpretation. When fewer variations are requested than formats available, select the narrative formats that feel most natural and compelling for this specific product's world.

    ADAPTIVE DIRECTION:
    Derive the world, setting, lighting, and cinematic tone from the brand memory if available. If brand memory is not provided, build the narrative environment from the product's natural context — where does this product live, who uses it, and in what kind of moment? A travel product tells a different story than a kitchen product or a tech accessory. The lighting, location, time of day, and surrounding details should all feel honest to the product's reality. Let the product's world guide the scene rather than imposing a generic aesthetic.

    FORMATS:

    1. THE REVEAL — The moment of first discovery. A product being opened, unwrapped, or encountered for the first time. Hands in motion. Packaging partially removed. The excitement lives in the anticipation and the act of uncovering.

    2. MID-JOURNEY — The product in active use during an experience already underway. A hike, a meal being cooked, a creative project in progress, a workout mid-set. There is motion and energy in the scene. The story is happening now and the product is woven into it.

    3. THE AFTERMATH — The quiet beat after the experience. Evidence of what just happened — an empty package, a finished plate, a completed project, golden light at the end of an adventure. The product sits in the scene as a trace of something meaningful that has already occurred. The mood is calm and reflective.

    4. TRANSFORMATION — A single frame that implies a before and after. Something is in the process of changing — a space being organized, a look being put together, ingredients becoming a dish. The product sits at the turning point between what was and what is becoming.

    GUIDING PRINCIPLES:
    - The story should emerge from the environment, props, lighting, and context — not from text or captions.
    - The product should be clearly recognizable within the scene, even when the narrative takes center stage.
    - Wider compositions that show enough of the surrounding world tend to strengthen the narrative — context is what makes a moment feel like a story.
    - If this ad is part of a broader campaign with other styles, it should feel like it belongs to the same brand while being distinctly different in its execution.
