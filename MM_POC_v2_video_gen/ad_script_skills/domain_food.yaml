name: domain_food
version: "1.0"
type: ad_script
fragments:
  default: |
    <domain_tactics name="Food & Beverage">
    Food advertising sells through the senses. The viewer should TASTE the product through their eyes and ears. Texture, steam, sizzle, and pour shots are your primary tools.

    PACING: Sensual and deliberate for premium/artisan food. Faster and energetic for casual/snack brands. Always pause on the "money shot" — the moment where the food looks most irresistible.

    NARRATION: Warm, inviting, slightly indulgent. Short phrases that mirror taste descriptions: "Rich. Creamy. Unforgettable." Use synesthesia — describe taste in visual and tactile terms. Sometimes silence + ASMR food sounds is more powerful than voiceover.

    VOCABULARY: "fresh", "handcrafted", "savor", "indulge", "farm-to-table", "slow-roasted", "artisan", "crispy", "melting"
    NEVER USE: "processed", "artificial", "synthetic", clinical language

    VISUAL DIRECTION:
    - Texture close-ups: dripping sauce, breaking bread, cheese pull, ice cream scoop, bubbling surface
    - Steam and sizzle: show heat, freshness, the moment of cooking. Sound design is crucial here
    - Overhead/45-degree hero shots for plated food. Eye-level for drinks being poured
    - Lighting: warm, golden, slightly directional. Back-light steam and beverages for glow
    - Color palette: warm earth tones, rich reds, golden yellows, deep greens. Appetite-stimulating colors
    - Hands in frame: someone preparing, serving, or enjoying the food adds human warmth
    - Slow-motion pour, drip, and splash shots for beverages

    MUSIC: Acoustic guitar, light jazz, or warm folk for artisan. Upbeat pop for casual brands. Match the cuisine culture when appropriate.

    CTA STYLE: "Order now — delivered hot", "Find your nearest location", "Taste the difference." Sensory language extends to CTA.
    </domain_tactics>
