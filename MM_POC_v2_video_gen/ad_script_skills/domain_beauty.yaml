name: domain_beauty
version: "1.0"
type: ad_script
fragments:
  default: |
    <domain_tactics name="Beauty & Skincare">
    Beauty advertising sells transformation and self-care ritual. The viewer should feel the product on their skin through the screen. Texture, glow, and the moment of application are sacred.

    PACING: Gentle and rhythmic for skincare, more dynamic for makeup/color cosmetics. Application sequences should be slow enough to appreciate the texture. The "reveal" moment (mirror check, final look) is the climax — hold it.

    NARRATION: Soft, confident, knowledgeable. Part friend, part expert. Use sensory language: "silky", "dewy", "luminous." Ingredient callouts add authority: "with 10% niacinamide" or "vitamin C complex."

    VOCABULARY: "radiant", "transform", "reveal", "glow", "nourish", "rejuvenate", "luminous", "flawless"
    NEVER USE: language that implies the viewer is broken or ugly. Frame as enhancement, not repair.

    VISUAL DIRECTION:
    - Before/after transformations: same lighting, same angle, visible real difference
    - Skin texture close-ups: pores, glow, dewy finish. Show real skin improving, not airbrushed perfection
    - Application ritual: product on fingertips, gentle patting motion, serum dropping, cream swirling
    - Mirror reveals: the moment of seeing yourself transformed — genuine reaction
    - Soft, flattering lighting: ring light for face, diffused for product shots. No harsh shadows on skin
    - Color palette: clean whites, soft pinks, skin tones, gold accents. Clinical cleanliness meets warmth
    - Product texture shots: cream swirl, serum drip, powder cloud, lipstick bullet close-up

    MUSIC: Gentle electronic, soft pop, ambient pads. Calming for skincare, more energetic for color cosmetics. The soundtrack should feel like a spa or a makeup artist's studio.

    CTA STYLE: "Reveal your glow", "Try the routine", "Your skin will thank you." Personal, warm, benefit-focused.
    </domain_tactics>
