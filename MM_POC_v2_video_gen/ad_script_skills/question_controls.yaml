name: question_controls
version: "3.0"
type: ad_script
fragments:
  ugc:
    general:
      questions:
        - id: ugc_talking_points
          question: What should the creator talk about in the video?
          options:
            - id: look_and_feel
              label: How it looks and feels
              description: Focus on color, texture, fabric feel, and overall vibe
            - id: occasion_fit
              label: Why it's perfect for the occasion
              description: Tie the product to a specific moment, event, or season
            - id: personal_story
              label: Personal experience with it
              description: Creator shares how they discovered it or a genuine reaction
            - id: standout_details
              label: What makes it stand out
              description: Highlight one or two specific details that are unique
        - id: ugc_setting
          question: Where should the creator film this?
          options:
            - id: home_natural
              label: At home with natural light
              description: Living room, bedroom, or near a window — casual and real
            - id: outdoor_casual
              label: Outdoors casually
              description: Doorstep, garden, street, or balcony — easy open-air feel
            - id: getting_ready
              label: Getting ready before heading out
              description: Mirror, vanity area, or entryway — pre-outing energy
            - id: on_the_go
              label: Out and about
              description: Walking, at a cafe, or at the event itself
        - id: ugc_closing
          question: How should the creator wrap up?
          options:
            - id: natural_signoff
              label: Natural sign-off
              description: Creator just says what they feel — warm, casual, no hard sell
            - id: urgency_cta
              label: Urgency nudge
              description: Mention a sale, limited stock, or reason to act fast
            - id: recommendation
              label: Personal recommendation
              description: Creator says they'd recommend it to a friend or family member
