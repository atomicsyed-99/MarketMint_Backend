name: Deploy to AWS ECS

on:
  workflow_dispatch: # 👈 enables manual trigger from GitHub UI
  push:
    branches:
      - infra-deployment
      - dev
      - stg

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout to read the contents of the repository

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ fromJSON('{"main":"PROD","dev":"DEV","stg":"STG","infra-deployment":"DEV"}')[github.ref_name] || github.ref_name }}
      cancel-in-progress: true
    environment:
      name: ${{ fromJSON('{"main":"PROD","dev":"DEV","stg":"STG","infra-deployment":"DEV"}')[github.ref_name] || github.ref_name }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Login to Amazon ECR Private
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push docker image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Enable GitHub Actions Cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Bundle Mastra Studio for DEV builds
          build-args: |
            BUILD_WITH_STUDIO=${{ fromJSON('{"main":"false","dev":"true","stg":"false","infra-deployment":"true"}')[github.ref_name] || 'false' }}
          # Define Tags
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY || 'my-ecr-repo' }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY || 'my-ecr-repo' }}:latest

      - name: Set image output
        id: set-output
        run: echo "image=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY || 'my-ecr-repo' }}:latest" >> $GITHUB_OUTPUT

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ vars.TASK_DEFINITION || 'my-task-definition' }} --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME || 'my-container' }}
          image: ${{ steps.set-output.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.SERVICE_NAME || 'my-service' }}
          cluster: ${{ vars.CLUSTER_NAME || 'my-cluster' }}
          wait-for-service-stability: false
